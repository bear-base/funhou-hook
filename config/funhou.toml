[[rules]]
match = "Read|Glob|Grep"
level = "info"

[[rules]]
match = "Notification(idle_prompt)"
level = "warning"

[[rules]]
match = "Notification(permission_prompt)"
level = "danger"

[[rules]]
match = "Edit(*.env*)"
level = "danger"

[[rules]]
match = "Bash(*deploy*|*migrate*)"
level = "danger"

[[rules]]
match = "Bash(*test*|*lint*)"
level = "info"

[defaults]
level = "warning"

[channels.terminal]
output = "/tmp/funhou.log"
levels = ["info", "warning", "danger", "error"]

[channels.slack]
enabled = false
# webhook = "https://hooks.slack.com/services/T000/B000/XXXX"
levels = ["info", "warning", "danger", "error"]
mention_on = ["warning", "danger"]
# mention_to = "@you"
